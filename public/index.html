<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>odogram — Mermaid Editor</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
  <script type="importmap">
  {
    "imports": {
      "mermaid": "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs",
      "elk-layouts": "/vendor/layout-elk/mermaid-layout-elk.esm.min.mjs"
    },
    "integrity": {
      "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs": "sha384-whY2DyvhZRFfs9hvtGdZaKcgbETgqMlDN+KNlWnXEL2QDa2XQkBOApUT7arfftO9",
      "/vendor/layout-elk/mermaid-layout-elk.esm.min.mjs": "sha384-lfTmp4hP1fc4jHvY19XR+AuXhPoswPuZTU4mcljLvHaj7DJ3SoCoSlEnOb2vn9B7"
    }
  }
  </script>
</head>
<body class="tab-source is-logged-out">
  <div class="app">
    <header class="toolbar">
      <div class="toolbar-brand">
        <button id="btn-sidebar-toggle" type="button" class="icon-btn" hidden aria-label="Toggle diagrams">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
        </button>
        <a href="/" class="brand-link" title="odogram home">
          <svg class="brand-logo" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="2" y="3" width="9" height="6" rx="1.5" fill="currentColor" opacity="0.9"/>
            <rect x="13" y="15" width="9" height="6" rx="1.5" fill="currentColor"/>
            <path d="M11 6v5h2v3h-4" stroke="currentColor" stroke-width="1.5" fill="none"/>
          </svg>
          <span class="brand-name">odogram</span>
        </a>
      </div>

      <div class="toolbar-center">
        <div class="toolbar-group toolbar-primary">
          <div class="save-group">
            <button id="btn-save" class="primary" disabled title="Save to GitHub">Save</button>
            <button id="btn-save-help" type="button" title="保存位置说明" aria-label="Save location help">?</button>
            <div id="save-help-popover" class="save-help-popover popover" hidden>
              <div id="save-help-content"></div>
            </div>
          </div>
          <label class="layout-select-wrap">
            Layout
            <select id="layout-select" title="Diagram layout">
              <option value="dagre">Default</option>
              <option value="elk">Orthogonal</option>
            </select>
          </label>
        </div>

        <div class="toolbar-divider" aria-hidden="true"></div>

        <div class="toolbar-group toolbar-secondary">
          <button id="btn-copy" type="button" class="btn-icon-text" title="Copy source">
            <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            <span>Copy</span>
          </button>
          <button id="btn-download" type="button" class="btn-icon-text" title="Download SVG">
            <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            <span>Download</span>
          </button>
          <button id="btn-example" type="button" class="btn-icon-text" title="Load example">
            <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            <span>Example</span>
          </button>
          <span id="share-url" class="share-url"></span>
        </div>
      </div>

      <span class="spacer"></span>

      <div class="toolbar-group toolbar-account">
        <div id="user-menu" class="user-menu" hidden>
          <button id="btn-user-toggle" type="button" class="user-menu-trigger" aria-haspopup="menu" aria-expanded="false">
            <img id="user-avatar" alt="" width="28" height="28">
            <span id="user-name" class="user-menu-name"></span>
            <svg class="user-menu-chevron" width="12" height="12" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
          </button>
          <div id="user-menu-popover" class="user-menu-popover popover" hidden role="menu">
            <button id="btn-menu-diagrams" type="button" class="menu-item" role="menuitem">
              <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
              My Diagrams
            </button>
            <button id="btn-logout" type="button" class="menu-item" role="menuitem">
              <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
              Logout
            </button>
          </div>
        </div>
        <button id="btn-login" type="button" class="btn-login">
          <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          <span>Sign in with GitHub</span>
        </button>
      </div>
    </header>

    <div class="main">
      <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <h3>My Diagrams</h3>
          <button id="btn-new-diagram" type="button" class="icon-btn sidebar-new-btn" title="New diagram" aria-label="New diagram">+</button>
        </div>
        <ul id="diagram-list" class="diagram-list"></ul>
      </aside>

      <div class="workbench-area">
        <div class="mobile-tabs" role="tablist" aria-label="Editor panels">
          <button id="tab-source" type="button" class="mobile-tab active" role="tab" aria-selected="true">Source</button>
          <button id="tab-preview" type="button" class="mobile-tab" role="tab" aria-selected="false">Preview</button>
        </div>

        <div class="workbench">
          <div class="pane pane-source">
            <div class="pane-header">Source</div>
            <div id="editor-root" class="editor-root"></div>
          </div>

          <div id="pane-resizer" class="pane-resizer" role="separator" tabindex="0" aria-label="Resize panes" aria-orientation="vertical"></div>

          <div class="pane pane-preview">
            <div class="pane-header preview-header">
              <span>Preview</span>
              <div class="preview-controls">
                <button type="button" id="btn-zoom-out" title="Zoom out" disabled>−</button>
                <span id="zoom-label" class="zoom-label">100%</span>
                <button type="button" id="btn-zoom-in" title="Zoom in" disabled>+</button>
                <button type="button" id="btn-zoom-fit" title="Fit to panel" disabled>Fit</button>
                <button type="button" id="btn-zoom-reset" title="100%" disabled>1:1</button>
              </div>
            </div>
            <div id="preview" class="preview-viewport">
              <div id="preview-canvas" class="preview-canvas"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="status" class="status" role="status" aria-live="polite"></div>
  </div>

  <div id="name-dialog-backdrop" class="modal-backdrop" hidden>
    <div id="name-dialog" class="name-dialog popover" role="dialog" aria-labelledby="name-dialog-title" aria-modal="true">
      <h2 id="name-dialog-title" class="name-dialog-title">Diagram name</h2>
      <p class="name-dialog-hint">3–64 个字符：中文、字母、数字、下划线、连字符</p>
      <input id="name-dialog-input" type="text" class="name-dialog-input" autocomplete="off" spellcheck="false">
      <p id="name-dialog-error" class="name-dialog-error" hidden></p>
      <div class="name-dialog-actions">
        <button type="button" id="name-dialog-cancel" class="name-dialog-btn">Cancel</button>
        <button type="button" id="name-dialog-overwrite" class="name-dialog-btn name-dialog-overwrite" hidden>Overwrite</button>
        <button type="button" id="name-dialog-confirm" class="name-dialog-btn primary">Confirm</button>
      </div>
    </div>
  </div>

  <div id="diagram-context-menu" class="context-menu popover" hidden role="menu">
    <button type="button" role="menuitem" data-action="rename">重命名</button>
    <button type="button" role="menuitem" data-action="duplicate">复制</button>
    <div class="context-menu-separator" role="separator"></div>
    <button type="button" role="menuitem" data-action="delete" class="context-menu-danger">删除</button>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
