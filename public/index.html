<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>odogram — Mermaid Editor</title>
  <link rel="stylesheet" href="/style.css">
  <script type="importmap">
  {
    "imports": {
      "@codemirror/state": "https://cdn.jsdelivr.net/npm/@codemirror/state@6.5.2/+esm",
      "@codemirror/view": "https://cdn.jsdelivr.net/npm/@codemirror/view@6.38.6/+esm",
      "@codemirror/commands": "https://cdn.jsdelivr.net/npm/@codemirror/commands@6.8.1/+esm",
      "@codemirror/language": "https://cdn.jsdelivr.net/npm/@codemirror/language@6.11.3/+esm",
      "@lezer/highlight": "https://cdn.jsdelivr.net/npm/@lezer/highlight@1.2.3/+esm",
      "@lezer/common": "https://cdn.jsdelivr.net/npm/@lezer/common@1.2.3/+esm",
      "@lezer/lr": "https://cdn.jsdelivr.net/npm/@lezer/lr@1.4.2/+esm",
      "@marijn/find-cluster-break": "https://cdn.jsdelivr.net/npm/@marijn/find-cluster-break@1.0.2/+esm",
      "crelt": "https://cdn.jsdelivr.net/npm/crelt@1.0.6/+esm",
      "w3c-keyname": "https://cdn.jsdelivr.net/npm/w3c-keyname@2.2.8/+esm",
      "style-mod": "https://cdn.jsdelivr.net/npm/style-mod@4.1.2/+esm"
    }
  }
  </script>
</head>
<body class="tab-source">
  <div class="app">
    <div class="toolbar">
      <button id="btn-sidebar-toggle" type="button" class="icon-btn" hidden aria-label="Toggle diagrams">☰</button>

      <div class="toolbar-group toolbar-primary">
        <div class="save-group">
          <button id="btn-save" class="primary" disabled title="Save to GitHub">Save</button>
          <button id="btn-save-help" type="button" title="保存位置说明" aria-label="Save location help">?</button>
          <div id="save-help-popover" class="save-help-popover" hidden>
            <div id="save-help-content"></div>
          </div>
        </div>
        <label class="layout-select-wrap">
          Layout
          <select id="layout-select" title="Diagram layout">
            <option value="dagre">Default</option>
            <option value="elk">Orthogonal</option>
          </select>
        </label>
      </div>

      <div class="toolbar-divider" aria-hidden="true"></div>

      <div class="toolbar-group toolbar-secondary">
        <button id="btn-copy" title="Copy source">Copy</button>
        <button id="btn-download" title="Download SVG">Download SVG</button>
        <button id="btn-example" title="Load example">Load Example</button>
        <span id="share-url" class="share-url"></span>
      </div>

      <span class="spacer"></span>

      <div class="toolbar-group toolbar-account">
        <div id="user-info" class="user-info" hidden>
          <img id="user-avatar" alt="" width="24" height="24">
          <span id="user-name"></span>
          <button id="btn-logout">Logout</button>
        </div>
        <button id="btn-login">Login with GitHub</button>
      </div>
    </div>

    <div class="main">
      <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

      <aside id="sidebar" class="sidebar">
        <h3>My Diagrams</h3>
        <ul id="diagram-list" class="diagram-list"></ul>
      </aside>

      <div class="workbench-area">
        <div class="mobile-tabs" role="tablist" aria-label="Editor panels">
          <button id="tab-source" type="button" class="mobile-tab active" role="tab" aria-selected="true">Source</button>
          <button id="tab-preview" type="button" class="mobile-tab" role="tab" aria-selected="false">Preview</button>
        </div>

        <div class="workbench">
          <div class="pane pane-source">
            <div class="pane-header">Source</div>
            <div id="editor-root" class="editor-root"></div>
          </div>

          <div id="pane-resizer" class="pane-resizer" role="separator" tabindex="0" aria-label="Resize panes" aria-orientation="vertical"></div>

          <div class="pane pane-preview">
            <div class="pane-header preview-header">
              <span>Preview</span>
              <div class="preview-controls">
                <button type="button" id="btn-zoom-out" title="Zoom out" disabled>−</button>
                <span id="zoom-label" class="zoom-label">100%</span>
                <button type="button" id="btn-zoom-in" title="Zoom in" disabled>+</button>
                <button type="button" id="btn-zoom-fit" title="Fit to panel" disabled>Fit</button>
                <button type="button" id="btn-zoom-reset" title="100%" disabled>1:1</button>
              </div>
            </div>
            <div id="preview" class="preview-viewport">
              <div id="preview-canvas" class="preview-canvas"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="status" class="status" role="status" aria-live="polite"></div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
